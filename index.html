// ==== SETTINGS ====
const QUESTIONS_PER_QUIZ = Math.min(25, quizData.length);

// ==== HELPERS ====
function shuffleOptions(question) {
  const correctText = question.options[question.answer];

  let shuffled = [...question.options]
    .map(opt => ({ opt, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ opt }) => opt);

  return {
    ...question,
    options: shuffled,
    answer: shuffled.indexOf(correctText)
  };
}

function pickRandomQuestions(data, count) {
  let shuffled = [...data]
    .map(q => ({ q, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ q }) => q);

  return shuffled.slice(0, count);
}

// ==== STATE ====
let selectedQuestions = pickRandomQuestions(quizData, QUESTIONS_PER_QUIZ);
let shuffledQuizData = selectedQuestions.map(q => shuffleOptions(q));
let userAnswers = new Array(shuffledQuizData.length).fill(null);

// ==== DOM ====
const quizDiv = document.getElementById("quiz");
const submitBtn = document.getElementById("submitBtn");
const retakeBtn = document.getElementById("retakeBtn");

// ==== LOAD QUIZ ====
function loadQuiz() {
  quizDiv.innerHTML = "";

  shuffledQuizData.forEach((q, qIndex) => {
    const qDiv = document.createElement("div");
    qDiv.className = "question";

    const title = document.createElement("h3");
    title.innerText = `${qIndex + 1}. ${q.question}`;
    qDiv.appendChild(title);

    q.options.forEach((opt, optIndex) => {
      const optDiv = document.createElement("div");
      optDiv.className = "option";
      optDiv.innerText = opt;

      if (userAnswers[qIndex] === optIndex) {
        optDiv.classList.add("selected");
      }

      optDiv.onclick = () => {
        const siblings = qDiv.querySelectorAll(".option");
        siblings.forEach(s => s.classList.remove("selected"));

        optDiv.classList.add("selected");
        userAnswers[qIndex] = optIndex;
      };

      qDiv.appendChild(optDiv);
    });

    quizDiv.appendChild(qDiv);
  });
}

// ==== SUBMIT ====
submitBtn.onclick = () => {
  let score = 0;
  quizDiv.innerHTML = "";

  shuffledQuizData.forEach((q, qIndex) => {
    const qDiv = document.createElement("div");
    qDiv.className = "question";

    const title = document.createElement("h3");
    title.innerText = `${qIndex + 1}. ${q.question}`;
    qDiv.appendChild(title);

    q.options.forEach((opt, optIndex) => {
      const optDiv = document.createElement("div");
      optDiv.className = "option";
      optDiv.innerText = opt;

      if (optIndex === q.answer) optDiv.classList.add("correct");
      if (userAnswers[qIndex] === optIndex && optIndex !== q.answer) {
        optDiv.classList.add("wrong");
      }

      qDiv.appendChild(optDiv);
    });

    if (userAnswers[qIndex] === q.answer) score++;

    const exp = document.createElement("p");
    exp.innerText = "Explanation: " + q.explanation;
    qDiv.appendChild(exp);

    quizDiv.appendChild(qDiv);
  });

  submitBtn.style.display = "none";
  retakeBtn.style.display = "inline-block";

  const result = document.createElement("h2");
  result.innerText = `Final Score: ${score} / ${shuffledQuizData.length}`;
  document.body.prepend(result);
};

// ==== RETAKE ====
retakeBtn.onclick = () => {
  userAnswers = new Array(quizData.length).fill(null);

  selectedQuestions = pickRandomQuestions(quizData, QUESTIONS_PER_QUIZ);
  shuffledQuizData = selectedQuestions.map(q => shuffleOptions(q));

  retakeBtn.style.display = "none";
  submitBtn.style.display = "inline-block";

  const oldScore = document.querySelector("h2");
  if (oldScore) oldScore.remove();

  loadQuiz();
};

// ==== INIT ====
loadQuiz();

</script>
